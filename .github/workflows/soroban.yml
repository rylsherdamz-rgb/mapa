name: Soroban Contract CI

on:
  push:
    branches: [main, master]
    paths:
      - "contracts/**"
  pull_request:
    branches: [main, master]
    paths:
      - "contracts/**"

jobs:
  matrix-build:
    strategy:
      matrix:
        contract: [mapa_game, mapa_location_vault]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32v1-none
          toolchain: stable
      - name: Build ${{ matrix.contract }}
        run: |
          cargo build --release --target wasm32-unknown-unknown \
            --manifest-path contracts/${{ matrix.contract }}/Cargo.toml
      - name: Test ${{ matrix.contract }}
        run: |
          cargo test --manifest-path contracts/${{ matrix.contract }}/Cargo.toml
      - name: Compute WASM hash
        run: |
          wasm_path="contracts/target/wasm32v1-none/release/${{ matrix.contract }}.wasm"
          if [ -f "$wasm_path" ]; then
            sha256sum "$wasm_path"
          fi
      - name: Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.contract }}-wasm
          path: contracts/target/wasm32v1-none/release/${{ matrix.contract }}.wasm

  verify:
    needs: [matrix-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all WASM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: *-wasm
          merge-multiple: true
      - name: Verify hashes
        run: |
          for wasm in *.wasm; do
            echo "$wasm: $(sha256sum "$wasm" | cut -d' ' -f1)"
          done
